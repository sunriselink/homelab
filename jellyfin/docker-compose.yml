services:
  init:
    image: localhost/homelab-init:v1
    pull_policy: never
    entrypoint: create-dirs
    environment:
      NAS_UID: ${NAS_UID:?}
      NAS_GID: ${NAS_GID:?}
    volumes:
      - ${PATH_TO_MEDIA:?}:/tmp/media
    command:
      - /tmp/media
      - /tmp/media/movies
      - /tmp/media/tv
      - /tmp/media/music

  # https://github.com/linuxserver/docker-jellyfin/pkgs/container/jellyfin
  # https://github.com/linuxserver/docker-jellyfin/releases
  # https://github.com/jellyfin/jellyfin/releases
  jellyfin:
    image: ghcr.io/linuxserver/jellyfin:10.11.6
    container_name: jellyfin
    restart: unless-stopped
    environment:
      PUID: ${NAS_UID:?}
      PGID: ${NAS_GID:?}
      TZ: ${TZ:?}
      DOCKER_MODS: linuxserver/mods:jellyfin-opencl-intel
    volumes:
      - ./config:/config
      - ./modcache:/modcache
      - ${PATH_TO_MEDIA:?}:/data
    devices:
      - /dev/dri:/dev/dri
    labels:
      glance.icon: di:jellyfin
      glance.url: https://jellyfin.${ROOT_DOMAIN:?}
      glance.category: media

      traefik.enable: true
      traefik.http.routers.jellyfin.entrypoints: local-secure,external-secure

      wud.watch: true
      wud.watch.digest: true
      wud.tag.include: ^v?\d+\.\d+\.\d+$$
      wud.tag.exclude: ^2021.\d+\.\d+$$
    depends_on:
      init:
        condition: service_completed_successfully

networks:
  default:
    name: ${COMPOSE_PROJECT_NAME:?}
    driver_opts:
      com.docker.network.bridge.name: br-${COMPOSE_PROJECT_NAME:?}
