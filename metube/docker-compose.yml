services:
  init:
    image: localhost/homelab-init:v1
    pull_policy: never
    working_dir: /tmp/metube
    entrypoint: ./init.sh
    environment:
      NAS_UID: ${NAS_UID:?}
      NAS_GID: ${NAS_GID:?}
    volumes:
      - ./:/tmp/metube
      - ${PATH_TO_MEDIA:?}:/tmp/media

  # https://github.com/alexta69/metube/releases
  metube:
    image: ghcr.io/alexta69/metube:2026.04.28
    container_name: metube
    restart: unless-stopped
    user: ${NAS_UID:?}:${NAS_GID:?}
    environment:
      LOGLEVEL: INFO
      YTDL_OPTIONS_PRESETS_FILE: /config/presets.json
    volumes:
      - ./config:/config:ro
      - ${PATH_TO_MEDIA:?}/downloads:/downloads
      - /etc/localtime:/etc/localtime:ro
    labels:
      glance.name: MeTube
      glance.icon: di:metube
      glance.url: https://metube.${ROOT_DOMAIN:?}
      glance.category: media_management

      traefik.enable: true
      traefik.http.routers.metube.middlewares: authelia@file

      wud.watch: true
      wud.watch.digest: true
      wud.tag.include: ^v?\d+\.\d+\.\d+$$
    depends_on:
      init:
        condition: service_completed_successfully

networks:
  default:
    name: metube
    driver_opts:
      com.docker.network.bridge.name: br-metube
