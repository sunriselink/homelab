# https://github.com/linuxserver/docker-socket-proxy/pkgs/container/socket-proxy
# https://github.com/linuxserver/docker-socket-proxy/releases
x-docker-socket: &common-opts
  image: ghcr.io/linuxserver/socket-proxy:3.2.13
  restart: unless-stopped
  read_only: true
  volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro
  tmpfs:
    - /run
  labels:
    wud.watch: true
    wud.watch.digest: true
    wud.tag.include: ^v?\d+\.\d+\.\d+$$

services:
  readonly-docker-socket:
    <<: *common-opts
    container_name: readonly-docker-socket
    networks:
      - dozzle
      - glance
      - wud
    ports:
      - 127.0.0.1:36301:2375
    environment:
      LOG_LEVEL: warning
      CONTAINERS: 1
      INFO: 1
      IMAGES: 1

  admin-docker-socket:
    <<: *common-opts
    container_name: admin-docker-socket
    networks:
      - dockge
    environment:
      LOG_LEVEL: warning
      BUILD: 1
      CONTAINERS: 1
      IMAGES: 1
      INFO: 1
      NETWORKS: 1
      SERVICES: 1
      POST: 1
      VOLUMES: 1

networks:
  dockge:
    name: docker-admin_dockge
    driver_opts:
      com.docker.network.bridge.name: br-sock_dockge
  dozzle:
    name: docker-readonly_dozzle
    driver_opts:
      com.docker.network.bridge.name: br-sock_dozzle
  glance:
    name: docker-readonly_glance
    driver_opts:
      com.docker.network.bridge.name: br-sock_glance
  wud:
    name: docker-readonly_wud
    driver_opts:
      com.docker.network.bridge.name: br-sock_wud
