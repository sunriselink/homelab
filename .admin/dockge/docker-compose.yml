services:
  init:
    image: localhost/homelab-init:v2
    pull_policy: never
    entrypoint: ./init.sh
    working_dir: /tmp/dockge
    environment:
      NAS_UID: ${NAS_UID:?}
      NAS_GID: ${NAS_GID:?}
    volumes:
      - ./:/tmp/dockge
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # https://github.com/louislam/dockge/releases
  dockge:
    image: louislam/dockge:1.5.0
    container_name: dockge
    restart: always
    user: ${NAS_UID:?}:${NAS_GID:?}
    networks:
      - docker-socket
    ports:
      - 5001:5001
    env_file:
      - ${PATH_TO_ROOT:?}/global.env
    environment:
      DOCKGE_STACKS_DIR: ${PATH_TO_ROOT:?}
      DOCKER_HOST: tcp://admin-docker-socket:2375
      DOCKER_BUILDKIT: 0
    volumes:
      - ./data:/app/data
      - ${PATH_TO_ROOT:?}:${PATH_TO_ROOT:?}:ro
      - /etc/localtime:/etc/localtime:ro
    labels:
      glance.icon: di:dockge
      glance.url: https://dockge.${ROOT_DOMAIN:?}
      glance.category: admin

      traefik.enable: true

      wud.watch: true
      wud.watch.digest: true
      wud.tag.include: ^v?\d+\.\d+\.\d+$$
    depends_on:
      init:
        condition: service_completed_successfully

networks:
  docker-socket:
    name: docker-admin_dockge
    external: true
