services:
  init:
    image: localhost/homelab-init:v1
    pull_policy: never
    working_dir: /tmp/filebrowser
    entrypoint: ./init.sh
    environment:
      NAS_UID: ${NAS_UID:?}
      NAS_GID: ${NAS_GID:?}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:?}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:?}
      ROOT_DOMAIN: ${ROOT_DOMAIN:?}
    volumes:
      - ./:/tmp/filebrowser
      - ${PATH_TO_MEDIA:?}:/tmp/media
      - ${PATH_TO_FILES:?}:/tmp/files

  # https://github.com/gtsteffaniak/filebrowser/pkgs/container/filebrowser
  # https://github.com/gtsteffaniak/filebrowser/releases
  filebrowser:
    image: ghcr.io/gtsteffaniak/filebrowser:1.2.2-stable-slim
    container_name: filebrowser
    restart: unless-stopped
    user: ${NAS_UID:?}:${NAS_GID:?}
    environment:
      TZ: ${TZ:?}
    volumes:
      - ./data:/home/filebrowser/data
      - ./cache:/home/filebrowser/cache
      - ${PATH_TO_MEDIA:?}:/srv/media
      - ${PATH_TO_FILES:?}:/srv/files
    labels:
      glance.icon: di:filebrowser-quantum
      glance.url: https://filebrowser.${ROOT_DOMAIN:?}
      glance.category: media

      traefik.enable: true

      wud.watch: true
      wud.watch.digest: true
      wud.tag.include: ^v?\d+\.\d+\.\d+\-stable\-slim$$
    depends_on:
      init:
        condition: service_completed_successfully

networks:
  default:
    name: ${COMPOSE_PROJECT_NAME:?}
    driver_opts:
      com.docker.network.bridge.name: br-${COMPOSE_PROJECT_NAME:?}
