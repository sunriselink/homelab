services:
  init:
    image: localhost/homelab-init:v1
    pull_policy: never
    entrypoint: create-dirs
    environment:
      NAS_UID: ${NAS_UID:?}
      NAS_GID: ${NAS_GID:?}
    volumes:
      - ./:/tmp/ddns-updater
    command:
      - /tmp/ddns-updater/data

  # https://github.com/qdm12/ddns-updater/pkgs/container/ddns-updater
  # https://github.com/qdm12/ddns-updater/releases
  ddns-updater:
    image: ghcr.io/qdm12/ddns-updater:2.9.0
    container_name: ddns-updater
    restart: unless-stopped
    user: ${NAS_UID:?}:${NAS_GID:?}
    environment:
      CONFIG: |
        {
          "settings": [
            {
              "provider": "dynu",
              "domain": "${ROOT_DOMAIN:?}",
              "username": "${DYNU_USERNAME:?}",
              "password": "${DYNU_PASSWORD:?}",
              "ip_version" :"ipv4"
            }
          ]
        }
      TZ: ${TZ:?}
    dns:
      - 9.9.9.10
      - 8.8.8.8
    volumes:
      - ./data:/updater/data
    labels:
      glance.name: DDNS Updater
      glance.icon: di:ddns-updater
      glance.url: https://ddns-updater.${ROOT_DOMAIN:?}
      glance.category: admin

      traefik.enable: true

      wud.watch: true
      wud.watch.digest: true
      wud.tag.include: ^v?\d+\.\d+\.\d+$$
    depends_on:
      init:
        condition: service_completed_successfully

networks:
  default:
    name: ${COMPOSE_PROJECT_NAME:?}
    driver_opts:
      com.docker.network.bridge.name: br-ddns
