services:
  init:
    image: localhost/homelab-init:v2
    pull_policy: never
    entrypoint: create-dirs
    environment:
      NAS_UID: ${NAS_UID:?}
      NAS_GID: ${NAS_GID:?}
    volumes:
      - ${PATH_TO_MEDIA:?}:/tmp/media
    command:
      - /tmp/media
      - /tmp/media/downloads

  # https://github.com/linuxserver/docker-prowlarr/releases
  # https://github.com/Prowlarr/Prowlarr/releases
  prowlarr:
    image: ghcr.io/linuxserver/prowlarr:2.4.0
    container_name: prowlarr
    restart: always
    environment:
      PUID: ${NAS_UID:?}
      PGID: ${NAS_GID:?}
      TZ: ${TZ:?}
    volumes:
      - ./prowlarr:/config
    labels:
      glance.icon: di:prowlarr
      glance.url: https://prowlarr.${ROOT_DOMAIN:?}
      glance.category: media_management

      traefik.enable: true

      wud.watch: true
      wud.watch.digest: true
      wud.tag.include: ^v?\d+\.\d+\.\d+$$
    depends_on:
      qbittorrent:
        condition: service_started

  # https://github.com/linuxserver/docker-qbittorrent/releases
  # https://www.qbittorrent.org/news
  qbittorrent:
    image: ghcr.io/linuxserver/qbittorrent:5.2.1
    container_name: qbittorrent
    restart: always
    networks:
      - default
      - apprise
    environment:
      PUID: ${NAS_UID:?}
      PGID: ${NAS_GID:?}
      TZ: ${TZ:?}
      APPRISE_CONFIG_KEY: ${APPRISE_CONFIG_KEY:?}
      APPRISE_TAG: ${APPRISE_TAG:?}
      WEBUI_PORT: 8080
      # https://github.com/VueTorrent/VueTorrent/releases
      DOCKER_MODS: ghcr.io/vuetorrent/vuetorrent-lsio-mod:2.34.0
    volumes:
      - ./qbittorrent:/config
      - ./modcache:/modcache
      - ./scripts:/scripts:ro
      - ${PATH_TO_MEDIA:?}/downloads:/downloads
    labels:
      glance.name: qBittorrent
      glance.icon: di:qbittorrent
      glance.url: https://qbittorrent.${ROOT_DOMAIN:?}
      glance.category: media_management

      traefik.enable: true
      traefik.http.services.qbittorrent.loadbalancer.server.port: 8080

      wud.watch: true
      wud.watch.digest: true
      wud.tag.include: ^v?\d+\.\d+\.\d+$$
      wud.tag.exclude: ^20.04.1|14.3.9$$
    depends_on:
      init:
        condition: service_completed_successfully

networks:
  default:
    name: torrent
    driver_opts:
      com.docker.network.bridge.name: br-torrent
  apprise:
    name: apprise_torrent
    external: true
