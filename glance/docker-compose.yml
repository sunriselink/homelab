services:
  # https://hub.docker.com/r/glanceapp/glance/tags
  # https://github.com/glanceapp/glance/releases
  glance:
    image: glanceapp/glance:v0.8.4
    container_name: glance
    restart: unless-stopped
    user: ${NAS_UID:?}:${NAS_GID:?}
    networks:
      - readonly-docker-socket
    environment:
      ADGUARD_URL: https://adguard.${ROOT_DOMAIN:?}
      ADGUARD_USERNAME: ${ADGUARD_USERNAME:?}
      ADGUARD_PASSWORD: ${ADGUARD_PASSWORD:?}
      WEATHER_LOCATION: ${WEATHER_LOCATION:?}
      WUD_URL: https://wud.${ROOT_DOMAIN:?}
    volumes:
      - ./config:/app/config:ro
      - /etc/localtime:/etc/localtime:ro
    labels:
      traefik.enable: true
traefik.http.routers.glance.middlewares: authelia@file

      wud.watch: true
      wud.watch.digest: true
      wud.tag.include: ^v?\d+\.\d+\.\d+$$

networks:
  readonly-docker-socket:
    external: true
