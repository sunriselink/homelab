services:
  # https://hub.docker.com/r/glanceapp/glance/tags
  # https://github.com/glanceapp/glance/releases
  glance:
    image: glanceapp/glance:v0.8.4
    container_name: glance
    restart: unless-stopped
    user: ${NAS_UID:?}:${NAS_GID:?}
    networks:
      - default
      - docker-socket
      - adguard
      - wud
    environment:
      ADGUARD_URL: http://adguard:80
      ADGUARD_USERNAME: ${ADGUARD_USERNAME:?}
      ADGUARD_PASSWORD: ${ADGUARD_PASSWORD:?}
      WEATHER_LOCATION: ${WEATHER_LOCATION:?}
      WUD_URL: http://whats-up-docker:3000
    volumes:
      - ./config:/app/config:ro
      - /etc/localtime:/etc/localtime:ro
    labels:
      traefik.enable: true
      traefik.http.routers.glance.middlewares: authelia@file

      wud.watch: true
      wud.watch.digest: true
      wud.tag.include: ^v?\d+\.\d+\.\d+$$

networks:
  default:
    name: glance
    driver_opts:
      com.docker.network.bridge.name: br-glance
  docker-socket:
    name: docker-readonly_glance
    external: true
  adguard:
    name: adguard_glance
    external: true
  wud:
    name: wud_glance
    external: true
