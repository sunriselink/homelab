services:
  # https://hub.docker.com/r/amir20/dozzle/tags
  # https://github.com/amir20/dozzle/releases
  dozzle:
    image: amir20/dozzle:v10.3.0
    container_name: dozzle
    restart: unless-stopped
    user: ${NAS_UID:?}:${NAS_GID:?}
    networks:
      - docker-socket
    environment:
      DOZZLE_NO_ANALYTICS: true
      DOZZLE_REMOTE_HOST: tcp://readonly-docker-socket:2375
    volumes:
      - /etc/localtime:/etc/localtime:ro
    labels:
      glance.icon: di:dozzle
      glance.url: https://dozzle.${ROOT_DOMAIN:?}
      glance.category: monitoring

      traefik.enable: true
      traefik.http.routers.dozzle.middlewares: authelia@file

      wud.watch: true
      wud.watch.digest: true
      wud.tag.include: ^v?\d+\.\d+\.\d+$$

networks:
  docker-socket:
    name: docker-readonly_dozzle
    external: true
