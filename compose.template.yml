services:
  # Init container when rootless mode is used
  init:
    image: localhost/homelab-init:v1
    pull_policy: never
    entrypoint: create-dirs
    environment:
      NAS_UID: ${NAS_UID:?}
      NAS_GID: ${NAS_GID:?}
    volumes:
      - ./:/tmp/<service-name>
    command:
      - /tmp/<service-name>/data
      - /tmp/<service-name>/config

  <service-name>:
    image: <service-name>:<service-version>
    container_name: <service-name>
    restart: unless-stopped
    user: ${NAS_UID:?}:${NAS_GID:?} # Rootless mode (if needed)
    environment:
      TZ: ${TZ:?} # Use local time via ENV
    volumes:
      - ./data:/data
      - ./config:/config
      - /etc/localtime:/etc/localtime:ro # Use local time via mount /etc/localtime
    labels:
      # Glance integration
      glance.name: Service Name # Customize service name (by default used normalized container name)
      glance.icon: di:<service-name> # https://github.com/glanceapp/glance/blob/main/docs/configuration.md#icons
      glance.url: https://<service-name>.${ROOT_DOMAIN:?}
      glance.category: <service-category> # See glance/config/glance.yml (docker-containers widget type)

      # Reverse Proxy support (see traefik/README.md for more examples)
      traefik.enable: true

      # Updates watcher via What's up Docker
      wud.watch: true
      wud.watch.digest: true
      wud.tag.include: ^v?\d+\.\d+\.\d+$$ # supported 5.0.1 and v5.0.1 formats
    depends_on:
      init:
        condition: service_completed_successfully

networks:
  default:
    name: <service-name>
    driver_opts:
      # length is limited to 15 characters
      com.docker.network.bridge.name: br-<service-name>
