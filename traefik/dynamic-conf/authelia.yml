# yaml-language-server: $schema=https://www.schemastore.org/traefik-v3-file-provider.json

http:
  middlewares:
    authelia:
      forwardAuth:
        address: http://localhost:43024/api/authz/forward-auth
        trustForwardHeader: true
        maxResponseBodySize: 16384
        authResponseHeaders:
          - Remote-User
          - Remote-Groups
          - Remote-Email
          - Remote-Name
