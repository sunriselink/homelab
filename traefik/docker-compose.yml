services:
  init:
    image: localhost/homelab-init:v1
    pull_policy: never
    working_dir: /tmp/traefik
    entrypoint: render-env
    environment:
      NAS_UID: ${NAS_UID:?}
      NAS_GID: ${NAS_GID:?}
      ROOT_DOMAIN: ${ROOT_DOMAIN:?}
      ACME_EMAIL: ${ACME_EMAIL:?}
    command:
      - ./traefik.tpl.yml
      - ./config/traefik.yml
    volumes:
      - ./:/tmp/traefik

  # https://hub.docker.com/_/traefik/tags
  # https://github.com/traefik/traefik/releases
  traefik:
    image: traefik:v3.6.12
    container_name: traefik
    restart: unless-stopped
    network_mode: host
    environment:
      ROOT_DOMAIN: ${ROOT_DOMAIN:?}
      DYNU_API_KEY: ${DYNU_API_KEY:?}
      CROWDSEC_LAPI_KEY: ${CROWDSEC_LAPI_KEY:?}
    dns:
      - 9.9.9.10
      - 8.8.8.8
    volumes:
      - ./config:/etc/traefik:ro
      - ./logs:/var/log/traefik
      - ./letsencrypt:/letsencrypt
      - /etc/localtime:/etc/localtime:ro
    labels:
      glance.icon: di:traefik
      glance.url: https://traefik.${ROOT_DOMAIN:?}
      glance.category: admin

      traefik.enable: true
      traefik.http.services.traefik-dashboard.loadbalancer.server.port: 8080
      traefik.http.routers.traefik-dashboard.middlewares: authelia@file

      wud.watch: true
      wud.watch.digest: true
      wud.tag.include: ^v?\d+\.\d+\.\d+$$
    depends_on:
      init:
        condition: service_completed_successfully

networks:
  default:
    name: traefik
    driver_opts:
      com.docker.network.bridge.name: br-traefik
