services:
  # https://github.com/louislam/uptime-kuma/releases
  uptime-kuma:
    image: louislam/uptime-kuma:2.4.0
    container_name: uptime-kuma
    restart: unless-stopped
    networks:
      - default
      - apprise
    environment:
      PUID: ${NAS_UID:?}
      PGID: ${NAS_GID:?}
      TZ: ${TZ:?}
    volumes:
      - ./data:/app/data
    labels:
      glance.icon: di:uptime-kuma
      glance.url: https://uptime-kuma.${ROOT_DOMAIN:?}
      glance.category: monitoring

      traefik.enable: true

      wud.watch: true
      wud.watch.digest: true
      wud.tag.include: ^v?\d+\.\d+\.\d+$$

networks:
  default:
    name: uptime-kuma
    driver_opts:
      com.docker.network.bridge.name: br-uptime-kuma
  apprise:
    name: apprise_uptime-kuma
    external: true
